name: bible_verse
description: A Flutter app for voice-activated Bible verse lookup with casting support

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  speech_to_text: ^6.6.0
  http: ^1.1.0
  permission_handler: ^11.1.0
  cast: ^1.0.0
  flutter_tts: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files
  generate: true

  assets:
    - assets/images/
    - assets/icons/